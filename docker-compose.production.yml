version: '3.8'

services:
  archer-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: archer-business-management
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://your-domain.com}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - archer-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.archer.rule=Host(`your-domain.com`)"
      - "traefik.http.routers.archer.entrypoints=websecure"
      - "traefik.http.routers.archer.tls.certresolver=letsencrypt"
      - "traefik.http.services.archer.loadbalancer.server.port=3000"

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: archer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - archer-app
    networks:
      - archer-network
    profiles:
      - nginx

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: archer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-your-redis-password}
    volumes:
      - redis-data:/data
    networks:
      - archer-network
    profiles:
      - cache

  # PostgreSQL (if not using Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: archer-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=archer
      - POSTGRES_USER=${POSTGRES_USER:-archer}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your-secure-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - archer-network
    profiles:
      - database

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: archer-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - archer-network
    profiles:
      - monitoring

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: archer-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - archer-network
    profiles:
      - monitoring

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  archer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 